<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pNotes</title>
    <link rel="stylesheet" href="./css/tailwind.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body class="relative overflow-hidden h-screen w-screen">
    <div
      class="fixed top-[0px] left-0px] rounded-full bg-blue-500/5 w-[1500px] h-[1500px] z-0"
    ></div>
    <div
      class="fixed top-[100px] left-200px] rounded-[100%] bg-blue-500/5 w-[1500px] h-[1500px] z-0"
    ></div>
    <div
      class="fixed top-[200px] left-400px] rounded-[100%] bg-blue-500/5 w-[1500px] h-[1500px] z-0"
    ></div>
    <div class="relative w-full h-full top-0 left-0 z-[1]">
      <div id="bar" class="!bg-gray-900 w-full h-[20px]">
        <pear-ctrl></pear-ctrl>
      </div>
      <div class="w-full h-full p-2 flex flex-col">
        <div class="w-full h-fit p-0 flex flex-row mb-0">
          <h1 class="w-2/3 text-3xl font-bold text-left text-blue-500 mb-2">
            pNotes
          </h1>
          <div
            id="invitePanel"
            class="flex flex-row rounded border-1 border-gray-800 p-1 items-center w-1/3 h-[30px] mt-2 mb-2 text-sm text-gray-600 hidden"
          >
            <div class="p-0 px-2 w-fit whitespace-nowrap">Invite Code:</div>
            <div
              id="inviteCode"
              class="p-0 w-full whitespace-nowrap overflow-hidden"
            >
              loading...
            </div>
            <button
              id="copyInviteCode"
              class="w-fit rounded-sm bg-gray-800 text-[10px] h-full m-2 text-gray-400 p-0 px-2 m-0 ml-2 mr-0"
            >
              COPY
            </button>
          </div>
        </div>
        <div
          id="startPanel"
          class="border-1 rounded border-gray-800 w-full p-4 hidden mt-14 mb-2"
        >
          <div class="flex flex-col justify-between items-center">
            <div class="flex flex-col w-1/2 justify-between items-center mb-4">
              <button
                id="newInstance"
                class="inline-flex items-center rounded bg-blue-500 hover:bg-blue-700 text-white h-[30px] px-4 gap-2"
              >
                <span>New Instance</span>
                <span
                  id="spinnerWrap"
                  class="hidden flex items-center justify-center"
                >
                  <img
                    class="block w-[30px] h-[30px]"
                    src="./images/Spinner@1x-1.4s-155px-155px.svg"
                    alt=""
                  />
                </span>
              </button>
            </div>
            <div class="flex flex-row w-2/3 items-center my-4">
              <div class="border-t-1 border-gray-500 w-full m-0 p-0"></div>
              <div class="w-24 p-0 m-0 mx-4 text-center">OR</div>
              <div class="border-t-1 border-gray-500 w-full m-0 p-0"></div>
            </div>
            <div class="flex flex-row w-1/2 justify-between items-center">
              <div class="flex flex-col w-full mt-[20px]">
                <div class="flex flex-row w-full text-sm">
                  <input
                    type="text"
                    id="pairText"
                    class="border-2 border-blue-500 focus:outline-1 focus:outline-blue-600 text-blue-500 rounded bg-white h-[30px] p-1 px-2 mb-2 mr-2 w-full"
                  />
                  <button
                    id="pair"
                    class="w-fit rounded bg-blue-500 hover:bg-blue-700 text-white p-1 px-4 h-[30px] mr-6"
                  >
                    Join
                  </button>
                  <div
                    class="bg-gray-800 text-sm text-gray-600 p-0 px-2 h-[30px] rounded flex flex-row items-center w-fit"
                  >
                    <div class="mr-2 p-o m-0 h-fit">Status:</div>
                    <div id="pairStatus" class="p-0 m-0 h-fit min-w-14">
                      unpaired
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div
          id="mainPanel"
          class="relative border-1 rounded border-gray-800 w-full p-0 h-full overflow-hidden"
        >
          <div class="flex flex-row h-full overflow-hidden">
            <div class="w-1/4 h-full overflow-hidden p-2">
              <div
                class="w-full h-full overflow-hidden rounded border border-gray-700 bg-gray-800/70"
              >
                <div
                  id="messages"
                  class="p-0 m-0 h-full overflow-y-auto no-scrollbar flex flex-col"
                ></div>
              </div>
            </div>
            <div class="flex flex-row w-full p-2 pl-0 h-full">
              <div class="flex flex-col mb-2 text-sm w-full h-full">
                <div class="p-0 mb-2 w-full">
                  <div
                    class="flex flex-row items-center justify-between w-full h-full"
                  >
                    <div
                      class="bg-gray-800/70 w-full h-[30px] rounded mr-4 items-center flex px-2"
                    >
                      <button
                        id="red"
                        class="w-[20px] h-[20px] rounded-full bg-red-900 hover:bg-red-700 border-2 border-gray-700 mr-2"
                      ></button>
                      <button
                        id="yellow"
                        class="w-[20px] h-[20px] rounded-full bg-yellow-900 hover:bg-yellow-700 border-2 border-gray-700 mr-2"
                      ></button>
                      <button
                        id="green"
                        class="w-[20px] h-[20px] rounded-full bg-green-900 hover:bg-green-700 border-2 border-gray-700 mr-2"
                      ></button>
                    </div>
                    <!-- <button -->
                    <!--   id="deleteAll" -->
                    <!--   class="w-fit rounded bg-red-500 hover:bg-red-700 text-white p-1 px-4 h-[30px]" -->
                    <!-- > -->
                    <!--   Delete All -->
                    <!-- </button> -->
                    <button
                      id="add"
                      class="w-fit rounded bg-green-500 hover:bg-green-700 text-white p-1 px-4 h-[30px]"
                    >
                      Add
                    </button>
                  </div>
                </div>
                <div
                  class="flex flex-col items-start text-sm w-full h-full border border-gray-700 rounded p-0 whitespace-pre-wrap mb-2"
                >
                  <textarea
                    id="msgText"
                    class="w-full h-full border-0 focus:outline-1 focus:outline-blue-600 text-blue-500 rounded bg-gray-800/70 p-1 px-2 mr-1 w-full"
                    wrap="soft"
                    style="resize: none; overflow: hidden"
                  ></textarea>
                </div>

                <div class="flex flex-row items-center justify-between w-full">
                  <div
                    id="statusTxt"
                    class="flex flex-row bg-gray-800/70 border border-gray-700 w-full h-[30px] rounded p-1 pt-1 px-2 text-sm text-gray-500 mr-2"
                  >
                    <span class="mr-2 p-o m-0 w-[20] h-[20px]">
                      <i data-lucide="badge-check" class="w-full h-full"></i>
                    </span>
                    <span>Status: good</span>
                  </div>

                  <button
                    id="testError"
                    class="w-fit rounded bg-red-500 whitespace-nowrap hover:bg-red-700 text-white p-1 px-4 h-[30px]"
                  >
                    Test Error
                  </button>
                  <button
                    id="resetStatus"
                    class="hidden w-fit rounded bg-orange-500 whitespace-nowrap hover:bg-orange-700 text-white p-1 px-4 h-[30px]"
                  >
                    Reset
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
